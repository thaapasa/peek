<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>System Dashboard</title><style>:root{--bg:#0d0e10;--fg:#d0d4dc;--accent:#ff6b9d;--muted:#6b7394;--surface:#151720}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,sans-serif;padding:2rem}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem}.card{background:var(--surface);border-radius:8px;padding:1.5rem;border:1px solid var(--muted)}.card h2{color:var(--accent);font-size:1.1rem;margin-bottom:1rem}.metric{display:flex;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid rgba(107,115,148,0.2)}.metric:last-child{border-bottom:none}.metric .label{color:var(--muted)}.metric .value{font-weight:600;font-variant-numeric:tabular-nums}.status{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:0.5rem}.status.ok{background:#a8e4a0}.status.warn{background:#ffd866}.status.error{background:#ff4060}</style></head><body><h1 style="color:var(--accent);margin-bottom:2rem">System Dashboard</h1><div class="grid"><div class="card"><h2>CPU Usage</h2><div class="metric"><span class="label"><span class="status ok"></span>web-01</span><span class="value">23%</span></div><div class="metric"><span class="label"><span class="status ok"></span>web-02</span><span class="value">41%</span></div><div class="metric"><span class="label"><span class="status warn"></span>api-01</span><span class="value">78%</span></div><div class="metric"><span class="label"><span class="status ok"></span>db-01</span><span class="value">52%</span></div></div><div class="card"><h2>Memory</h2><div class="metric"><span class="label">Allocated</span><span class="value">24.3 GiB</span></div><div class="metric"><span class="label">Used</span><span class="value">18.7 GiB</span></div><div class="metric"><span class="label">Cached</span><span class="value">4.1 GiB</span></div><div class="metric"><span class="label">Free</span><span class="value">1.5 GiB</span></div></div><div class="card"><h2>Recent Events</h2><div class="metric"><span class="label">Deploy #847</span><span class="value">2 min ago</span></div><div class="metric"><span class="label">Alert cleared</span><span class="value">15 min ago</span></div><div class="metric"><span class="label">Backup complete</span><span class="value">1 hr ago</span></div></div></div><script>document.querySelectorAll('.value').forEach(el=>{const n=parseFloat(el.textContent);if(!isNaN(n)&&el.textContent.includes('%')){el.style.color=n>80?'var(--accent)':n>60?'#ffd866':'#a8e4a0'}});setInterval(()=>{document.querySelectorAll('.metric .value').forEach(el=>{if(el.textContent.includes('%')){const current=parseFloat(el.textContent);const delta=(Math.random()-0.5)*5;const next=Math.max(0,Math.min(100,current+delta));el.textContent=next.toFixed(0)+'%'}})},3000)</script></body></html>
