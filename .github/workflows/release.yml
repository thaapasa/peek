name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      previous_tag: ${{ steps.version.outputs.previous_tag }}
      sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read version from Cargo.toml
        id: version
        run: |
          set -euo pipefail
          VERSION=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/^version = "([^"]+)".*/\1/')
          if [ -z "$VERSION" ]; then
            echo "::error::could not parse version from Cargo.toml"
            exit 1
          fi
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          PREVIOUS_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)
          echo "previous_tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG (previous: ${PREVIOUS_TAG:-none})"

      - name: Fail if tag already exists on origin
        run: |
          set -euo pipefail
          TAG='${{ steps.version.outputs.tag }}'
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "::error::tag $TAG already exists on origin — bump Cargo.toml or delete the existing release+tag before re-running (see docs/release.md)"
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            archive: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-14
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          STAGE="peek-$VERSION-${{ matrix.target }}"
          mkdir -p "dist/$STAGE"
          cp "target/${{ matrix.target }}/release/peek" "dist/$STAGE/"
          cp README.md LICENSE "dist/$STAGE/"
          (cd dist && tar czf "$STAGE.tar.gz" "$STAGE")
          (cd dist && shasum -a 256 "$STAGE.tar.gz" > "$STAGE.tar.gz.sha256")

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $stage = "peek-$env:VERSION-${{ matrix.target }}"
          New-Item -ItemType Directory -Path "dist/$stage" -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/peek.exe" "dist/$stage/"
          Copy-Item README.md, LICENSE "dist/$stage/"
          Compress-Archive -Path "dist/$stage/*" -DestinationPath "dist/$stage.zip"
          $hash = (Get-FileHash -Algorithm SHA256 "dist/$stage.zip").Hash.ToLower()
          "$hash  $stage.zip" | Out-File -Encoding ascii "dist/$stage.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: peek-${{ matrix.target }}
          path: |
            dist/peek-*.tar.gz
            dist/peek-*.tar.gz.sha256
            dist/peek-*.zip
            dist/peek-*.zip.sha256
          if-no-files-found: error

  release:
    name: Create release
    needs: [prepare, build]
    runs-on: ubuntu-24.04
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      TAG: ${{ needs.prepare.outputs.tag }}
      PREVIOUS_TAG: ${{ needs.prepare.outputs.previous_tag }}
      SHA: ${{ needs.prepare.outputs.sha }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Create and push tag
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git tag "$TAG" "$SHA"
          git push origin "$TAG"

      - name: Generate release notes
        id: notes
        run: |
          set -euo pipefail
          {
            echo "## Install"
            echo
            echo '```sh'
            echo 'curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh'
            echo '```'
            echo
            echo 'See the README for Windows and manual-download instructions.'
            echo
            echo "## Changes"
            echo
            if [ -n "$PREVIOUS_TAG" ]; then
              git log "$PREVIOUS_TAG..$TAG" --pretty=format:'- %s' --no-merges
            else
              git log "$TAG" --pretty=format:'- %s' --no-merges
            fi
          } > release-notes.md
          echo "notes_path=$GITHUB_WORKSPACE/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG }}
          name: peek ${{ env.TAG }}
          body_path: ${{ steps.notes.outputs.notes_path }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.sha256
            artifacts/*.zip
            artifacts/*.zip.sha256
            install.sh
          fail_on_unmatched_files: true
