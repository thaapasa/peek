name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump level
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      notes:
        description: Highlights for the release notes (optional). Plain markdown, multi-line OK. Rendered above the auto-generated commit list.
        type: string
        required: false
        default: ''

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release branch
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      previous_tag: ${{ steps.version.outputs.previous_tag }}
      branch: ${{ steps.version.outputs.branch }}
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute bumped version
        id: version
        run: |
          set -euo pipefail
          CURRENT=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/^version = "([^"]+)".*/\1/')
          if [ -z "$CURRENT" ]; then
            echo "::error::could not parse version from Cargo.toml"
            exit 1
          fi
          IFS=. read -r MAJOR MINOR PATCH <<EOF
          $CURRENT
          EOF
          case '${{ inputs.bump }}' in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          VERSION="$MAJOR.$MINOR.$PATCH"
          TAG="v$VERSION"
          BRANCH="release/$TAG"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          PREVIOUS_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)
          echo "previous_tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT -> $VERSION (${{ inputs.bump }}), branch $BRANCH (previous tag: ${PREVIOUS_TAG:-none})"

      - name: Fail if tag already exists on origin
        run: |
          set -euo pipefail
          TAG='${{ steps.version.outputs.tag }}'
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "::error::tag $TAG already exists on origin — delete the existing release+tag before re-running (see docs/release.md)"
            exit 1
          fi

      - name: Create release branch with version bump
        id: commit
        # Pass the dispatch input through an env var instead of `${{ }}`
        # interpolation so backticks / quotes / newlines in the
        # highlights message can't break the shell script.
        env:
          HIGHLIGHTS: ${{ inputs.notes }}
        run: |
          set -euo pipefail
          VERSION='${{ steps.version.outputs.version }}'
          BRANCH='${{ steps.version.outputs.branch }}'
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          # Bump the package version in Cargo.toml (first occurrence) and the
          # matching peek entry in Cargo.lock so --locked builds stay valid.
          sed -i -E '0,/^version = "[^"]+"/s//version = "'"$VERSION"'"/' Cargo.toml
          perl -0pi -e 's/(name = "peek"\nversion = ")[^"]+/${1}'"$VERSION"'/' Cargo.lock
          git checkout -B "$BRANCH"
          git add Cargo.toml Cargo.lock
          # When highlights are supplied, attach them as the commit body so
          # the bump commit doubles as the release-notes record (visible in
          # `git log` long after the GitHub Release UI is gone).
          if [ -n "$HIGHLIGHTS" ]; then
            git commit -m "Bump version to $VERSION" -m "$HIGHLIGHTS"
          else
            git commit -m "Bump version to $VERSION"
          fi
          git push --force origin "$BRANCH"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        # `test: true` runs `cargo test` for this target before bundling
        # artifacts — only set when the target matches the runner's
        # native arch (no emulator dependency). x86_64-apple-darwin is
        # cross-built from the arm64 macos-14 runner, so its test
        # binaries can't be run directly; ubuntu / windows / arm-mac
        # entries are all native and do exercise the suite.
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            archive: tar.gz
            pdfium_asset: pdfium-mac-arm64.tgz
            pdfium_lib: lib/libpdfium.dylib
            test: true
          - target: x86_64-apple-darwin
            runner: macos-14
            archive: tar.gz
            pdfium_asset: pdfium-mac-x64.tgz
            pdfium_lib: lib/libpdfium.dylib
            test: false
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            archive: tar.gz
            pdfium_asset: pdfium-linux-x64.tgz
            pdfium_lib: lib/libpdfium.so
            test: true
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            archive: tar.gz
            pdfium_asset: pdfium-linux-arm64.tgz
            pdfium_lib: lib/libpdfium.so
            test: true
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
            pdfium_asset: pdfium-win-x64.tgz
            pdfium_lib: bin/pdfium.dll
            test: true
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          # key suffix bumped to discard caches that baked in ~/.cargo/bin
          key: ${{ matrix.target }}-v2
          # Don't cache ~/.cargo/bin — restoring it clobbers the rustup
          # proxies the toolchain step installs, leaving `cargo` pointing at
          # rustup-init.
          cache-bin: false

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      # Test on every native target before bundling artifacts —
      # catches arch- / OS-specific regressions in targets CI doesn't
      # cover (arm linux, both macs). Cross-compiled targets are
      # skipped via `matrix.test`.
      - name: Test
        if: matrix.test
        run: cargo test --release --locked --target ${{ matrix.target }}

      - name: Bundle Pdfium
        shell: bash
        run: |
          set -euo pipefail
          BUILD=$(grep -m1 '^BUILD=' .pdfium/VERSION | cut -d= -f2)
          if [ -z "$BUILD" ]; then
            echo "::error::could not parse BUILD from .pdfium/VERSION"
            exit 1
          fi
          URL="https://github.com/bblanchon/pdfium-binaries/releases/download/chromium/$BUILD/${{ matrix.pdfium_asset }}"
          STAGE="peek-$VERSION-${{ matrix.target }}"
          mkdir -p "dist/$STAGE" pdfium-staging
          echo "downloading $URL"
          curl -fsSL -o pdfium.tgz "$URL"
          tar xzf pdfium.tgz -C pdfium-staging
          cp "pdfium-staging/${{ matrix.pdfium_lib }}" "dist/$STAGE/"
          cp pdfium-staging/LICENSE "dist/$STAGE/LICENSE-pdfium"

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          STAGE="peek-$VERSION-${{ matrix.target }}"
          mkdir -p "dist/$STAGE"
          cp "target/${{ matrix.target }}/release/peek" "dist/$STAGE/"
          cp README.md LICENSE "dist/$STAGE/"
          (cd dist && tar czf "$STAGE.tar.gz" "$STAGE")
          (cd dist && shasum -a 256 "$STAGE.tar.gz" > "$STAGE.tar.gz.sha256")

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $stage = "peek-$env:VERSION-${{ matrix.target }}"
          New-Item -ItemType Directory -Path "dist/$stage" -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/peek.exe" "dist/$stage/"
          Copy-Item README.md, LICENSE "dist/$stage/"
          Compress-Archive -Path "dist/$stage/*" -DestinationPath "dist/$stage.zip"
          $hash = (Get-FileHash -Algorithm SHA256 "dist/$stage.zip").Hash.ToLower()
          "$hash  $stage.zip" | Out-File -Encoding ascii "dist/$stage.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: peek-${{ matrix.target }}
          path: |
            dist/peek-*.tar.gz
            dist/peek-*.tar.gz.sha256
            dist/peek-*.zip
            dist/peek-*.zip.sha256
          if-no-files-found: error

  release:
    name: Merge and release
    needs: [prepare, build]
    runs-on: ubuntu-24.04
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      TAG: ${{ needs.prepare.outputs.tag }}
      BRANCH: ${{ needs.prepare.outputs.branch }}
      PREVIOUS_TAG: ${{ needs.prepare.outputs.previous_tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Merge release branch into main
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git fetch origin "$BRANCH"
          if git merge --ff-only "origin/$BRANCH"; then
            echo "fast-forward merge into main"
          else
            echo "main moved since the release branch was cut — recording a merge commit"
            git merge --no-ff "origin/$BRANCH" -m "Merge $BRANCH"
          fi
          git push origin main

      - name: Create and push tag
        run: |
          set -euo pipefail
          # Tag the release-branch commit that was actually built, not the
          # merge commit — on a --no-ff merge the merge commit's tree includes
          # whatever raced onto main, which the release artifacts don't have.
          # That commit is reachable from main after the merge regardless.
          git tag "$TAG" '${{ needs.prepare.outputs.sha }}'
          git push origin "$TAG"

      - name: Generate release notes
        id: notes
        # Pass the dispatch input through an env var instead of `${{ }}`
        # interpolation so backticks / quotes / newlines in the
        # highlights message can't break the shell script.
        env:
          HIGHLIGHTS: ${{ inputs.notes }}
        run: |
          set -euo pipefail
          {
            if [ -n "$HIGHLIGHTS" ]; then
              echo "## Highlights"
              echo
              echo "$HIGHLIGHTS"
              echo
            fi
            echo "## Install"
            echo
            echo '```sh'
            echo 'curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh'
            echo '```'
            echo
            echo 'See the README for Windows and manual-download instructions.'
            echo
            echo "## Changes"
            echo
            if [ -n "$PREVIOUS_TAG" ]; then
              git log "$PREVIOUS_TAG..$TAG" --pretty=format:'- %s' --no-merges
            else
              git log "$TAG" --pretty=format:'- %s' --no-merges
            fi
          } > release-notes.md
          echo "notes_path=$GITHUB_WORKSPACE/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG }}
          name: peek ${{ env.TAG }}
          body_path: ${{ steps.notes.outputs.notes_path }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.sha256
            artifacts/*.zip
            artifacts/*.zip.sha256
            install.sh
          fail_on_unmatched_files: true

      - name: Delete release branch
        run: git push origin --delete "$BRANCH"
